name: CommandCenter
options:
  bundleIdPrefix: com.commandcenter
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: false
    DEVELOPMENT_TEAM: UX947S6H38

targets:
  CommandCenter:
    type: application
    platform: iOS
    sources:
      - path: CommandCenter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.commandcenter.ios
        INFOPLIST_FILE: CommandCenter/Info.plist
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"
    info:
      path: CommandCenter/Info.plist
      properties:
        CFBundleDisplayName: Command Center
        CFBundleIconName: AppIcon
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "Command Center uses the microphone for voice input."
        NSPhotoLibraryUsageDescription: "Command Center uses your photo library to share images."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
    scheme:
      testTargets: []
      gatherCoverageData: false
      commandLineArguments: {}

schemes:
  CommandCenter:
    build:
      targets:
        CommandCenter: all
    run:
      config: Debug
    archive:
      config: Release
